services:
  postgres-db:
    image: postgres:18-bookworm
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dani123l
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - ./docker/pgdata:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  application:
    build: .
    container_name: application-container
    ports:
      - "5050:5050"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      DB_HOST: postgres-db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: dani123l
      DB_NAME: library